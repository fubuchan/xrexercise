<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XRエクササイズ</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.3/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: black; font-family: 'Helvetica Neue', 'Hiragino Sans', sans-serif; }

    #title {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: white; font-size: 18px; font-weight: bold;
      background: rgba(220,60,60,0.9); padding: 8px 24px;
      border-radius: 20px; z-index: 999; pointer-events: none; white-space: nowrap;
    }
    #status {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      font-size: 15px; font-weight: bold; text-align: center;
      padding: 12px 24px; border-radius: 20px; z-index: 9999;
      white-space: nowrap; cursor: pointer;
      background: rgba(80,80,80,0.85); color: #ccc;
      border: none; outline: none; transition: background 0.3s;
    }
    #status.found { background: rgba(0,180,80,0.95); color: white; }

    #confidence {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      font-size: 13px; color: white;
      background: rgba(0,0,0,0.5); padding: 6px 16px;
      border-radius: 12px; z-index: 9999; pointer-events: none; white-space: nowrap;
    }

    /* Three.jsキャンバス（AR上に重ねる） */
    #three-canvas {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -65%);
      width: 280px; height: 380px;
      z-index: 500;
      pointer-events: none;
      background: transparent;
    }
    #three-canvas.active { display: block; }

    /* オーバーレイ */
    #exercise-overlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 10000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #exercise-overlay.active { display: flex; }

    .exercise-card {
      background: white; border-radius: 24px;
      padding: 24px 20px; width: 100%; max-width: 360px; text-align: center;
    }
    .acquired-badge {
      background: #ff6b35; color: white; font-size: 12px; font-weight: bold;
      padding: 6px 16px; border-radius: 20px; display: inline-block;
      margin-bottom: 16px; line-height: 1.5;
    }
    .exercise-name { font-size: 20px; font-weight: bold; color: #1a1a1a; margin-bottom: 4px; }
    .exercise-name-en { font-size: 12px; color: #888; margin-bottom: 12px; }

    #overlay-canvas-wrap {
      background: #e8f5e9; border-radius: 16px;
      height: 180px; margin-bottom: 16px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    #overlay-canvas { width: 100%; height: 180px; }

    .speech-bubble {
      background: #00c853; color: white; border-radius: 16px;
      padding: 14px 18px; font-size: 14px; font-weight: bold;
      line-height: 1.7; margin-bottom: 16px; text-align: left;
    }
    .close-btn {
      background: #eeeeee; color: #333; border: none;
      border-radius: 12px; padding: 14px 0;
      font-size: 15px; font-weight: bold; cursor: pointer; width: 100%;
    }
  </style>
  <script>
    const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/x5wEdZGP7/';
    let tmModel;
    let arRenderer, arScene, arCamera, arMixer, arClock;
    let overlayRenderer, overlayScene, overlayCamera, overlayMixer, overlayClock;

    // Three.jsでGLBを描画（AR上）
    function initArThree() {
      const canvas = document.getElementById('three-canvas');
      arRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      arRenderer.setSize(280, 380);
      arRenderer.setClearColor(0x000000, 0);
      arScene = new THREE.Scene();
      arCamera = new THREE.PerspectiveCamera(45, 280/380, 0.1, 100);
      arCamera.position.set(0, 1, 4);
      arScene.add(new THREE.AmbientLight(0xffffff, 2));
      const dLight = new THREE.DirectionalLight(0xffffff, 1);
      dLight.position.set(1, 2, 2);
      arScene.add(dLight);
      arClock = new THREE.Clock();

      const loader = new THREE.GLTFLoader();
      loader.load('character.glb', (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.6, 0.6, 0.6);
        model.position.set(0, -1, 0);
        arScene.add(model);
        if (gltf.animations.length > 0) {
          arMixer = new THREE.AnimationMixer(model);
          arMixer.clipAction(gltf.animations[0]).play();
        }
      });

      animateAr();
    }

    function animateAr() {
      requestAnimationFrame(animateAr);
      if (arMixer) arMixer.update(arClock.getDelta());
      arRenderer.render(arScene, arCamera);
    }

    // Three.jsでGLBを描画（オーバーレイ内）
    function initOverlayThree() {
      const canvas = document.getElementById('overlay-canvas');
      overlayRenderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      overlayRenderer.setSize(320, 180);
      overlayRenderer.setClearColor(0xe8f5e9);
      overlayScene = new THREE.Scene();
      overlayCamera = new THREE.PerspectiveCamera(45, 320/180, 0.1, 100);
      overlayCamera.position.set(0, 1, 4);
      overlayScene.add(new THREE.AmbientLight(0xffffff, 2));
      const dLight = new THREE.DirectionalLight(0xffffff, 1);
      dLight.position.set(1, 2, 2);
      overlayScene.add(dLight);
      overlayClock = new THREE.Clock();

      const loader = new THREE.GLTFLoader();
      loader.load('character.glb', (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.4, 0.4, 0.4);
        model.position.set(0, -0.8, 0);
        overlayScene.add(model);
        if (gltf.animations.length > 0) {
          overlayMixer = new THREE.AnimationMixer(model);
          overlayMixer.clipAction(gltf.animations[0]).play();
        }
      });

      animateOverlay();
    }

    function animateOverlay() {
      requestAnimationFrame(animateOverlay);
      if (overlayMixer) overlayMixer.update(overlayClock.getDelta());
      overlayRenderer.render(overlayScene, overlayCamera);
    }

    // Teachable Machine
    async function initTM() {
      try {
        tmModel = await tmImage.load(MODEL_URL + 'model.json', MODEL_URL + 'metadata.json');
        document.getElementById('confidence').textContent = '準備完了 - 非常口にカメラを向けてください';
        predict();
      } catch(e) {
        document.getElementById('confidence').textContent = 'モデル読み込みエラー';
      }
    }

    async function predict() {
      if (!tmModel) return;
      const video = document.querySelector('video');
      if (!video || video.readyState < 2) { setTimeout(predict, 500); return; }
      try {
        const prediction = await tmModel.predict(video);
        const top = prediction.reduce((a, b) => a.probability > b.probability ? a : b);
        const isExit = top.className === 'Class 1' && top.probability > 0.7;
        document.getElementById('confidence').textContent =
          `${top.className}: ${Math.round(top.probability * 100)}%`;
        const statusEl = document.getElementById('status');
        const canvas = document.getElementById('three-canvas');
        if (isExit) {
          statusEl.textContent = '✅ 非常口 認識中　→　タップ';
          statusEl.className = 'found';
          canvas.classList.add('active');
        } else {
          statusEl.textContent = '🔍 非常口にカメラを向けてください';
          statusEl.className = '';
          canvas.classList.remove('active');
        }
      } catch(e) {}
      setTimeout(predict, 500);
    }

    function openOverlay() {
      document.getElementById('exercise-overlay').classList.add('active');
    }
    function closeOverlay() {
      document.getElementById('exercise-overlay').classList.remove('active');
    }

    window.addEventListener('load', () => {
      initArThree();
      initOverlayThree();
      setTimeout(initTM, 3000);
    });
  </script>
</head>
<body>
  <div id="title">XR エクササイズ</div>
  <div id="confidence">モデル読み込み中...</div>

  <canvas id="three-canvas"></canvas>

  <button id="status" ontouchend="openOverlay()" onclick="openOverlay()">
    🔍 非常口にカメラを向けてください
  </button>

  <div id="exercise-overlay">
    <div class="exercise-card">
      <div class="acquired-badge">🎉 エクササイズ01：非常口の退勤後　を採取しました！</div>
      <div class="exercise-name">ベントニーシットアップ</div>
      <div class="exercise-name-en">Bent Knee Sit-Up</div>
      <div id="overlay-canvas-wrap">
        <canvas id="overlay-canvas"></canvas>
      </div>
      <div class="speech-bubble">
        あの姿勢をずっと続けるために、<br>体幹を鍛えております。
      </div>
      <button class="close-btn" ontouchend="closeOverlay()" onclick="closeOverlay()">
        閉じる
      </button>
    </div>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false"
  >
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
