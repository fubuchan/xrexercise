<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XRエクササイズ</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.3/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: black; font-family: 'Helvetica Neue', 'Hiragino Sans', sans-serif; }

    #title {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: white; font-size: 18px; font-weight: bold;
      background: rgba(220,60,60,0.9); padding: 8px 24px;
      border-radius: 20px; z-index: 999; pointer-events: none; white-space: nowrap;
    }

    #status {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      font-size: 15px; font-weight: bold; text-align: center;
      padding: 12px 24px; border-radius: 20px; z-index: 9999;
      white-space: nowrap; cursor: pointer;
      background: rgba(80,80,80,0.85); color: #ccc;
      border: none; outline: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.3s;
    }
    #status.found { background: rgba(0,180,80,0.95); color: white; }

    #confidence {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      font-size: 13px; color: white;
      background: rgba(0,0,0,0.5); padding: 6px 16px;
      border-radius: 12px; z-index: 9999; pointer-events: none;
      white-space: nowrap;
    }

    #exercise-overlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 10000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #exercise-overlay.active { display: flex; }

    .exercise-card {
      background: white;
      border-radius: 24px;
      padding: 24px 20px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .acquired-badge {
      background: #ff6b35;
      color: white;
      font-size: 12px;
      font-weight: bold;
      padding: 6px 16px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .exercise-name {
      font-size: 20px;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .exercise-name-en {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
    }
    .model-area {
      background: #e8f5e9;
      border-radius: 16px;
      height: 150px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }
    .speech-bubble {
      background: #00c853;
      color: white;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 14px;
      font-weight: bold;
      line-height: 1.7;
      margin-bottom: 16px;
      text-align: left;
    }
    .close-btn {
      background: #eeeeee;
      color: #333;
      border: none;
      border-radius: 12px;
      padding: 14px 0;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
  <script>
    const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/x5wEdZGP7/';
    let model, webcamEl, isRunning = false;
    let exitDetected = false;

    async function initTM() {
      const modelURL = MODEL_URL + 'model.json';
      const metadataURL = MODEL_URL + 'metadata.json';
      model = await tmImage.load(modelURL, metadataURL);

      // カメラ映像をa-sceneのvideoから取得
      await predict();
    }

    async function predict() {
      if (!model) return;

      // a-sceneのvideo要素を取得
      const video = document.querySelector('video');
      if (!video || video.readyState < 2) {
        setTimeout(predict, 500);
        return;
      }

      const prediction = await model.predict(video);
      const exitClass = prediction.find(p => p.className === 'Class 1' || p.className.includes('exit') || p.className.includes('Exit'));
      const confidence = exitClass ? exitClass.probability : prediction[0].probability;
      const label = exitClass ? exitClass.className : prediction[0].className;

      document.getElementById('confidence').textContent =
        `認識: ${label} (${Math.round(confidence * 100)}%)`;

      if (exitClass && exitClass.probability > 0.7) {
        exitDetected = true;
        const statusEl = document.getElementById('status');
        statusEl.textContent = '✅ 非常口 認識中　→　タップ';
        statusEl.className = 'found';
      } else {
        exitDetected = false;
        const statusEl = document.getElementById('status');
        statusEl.textContent = '🔍 非常口にカメラを向けてください';
        statusEl.className = '';
      }

      setTimeout(predict, 500);
    }

    function openOverlay() {
      document.getElementById('exercise-overlay').classList.add('active');
    }
    function closeOverlay() {
      document.getElementById('exercise-overlay').classList.remove('active');
    }

    window.addEventListener('load', () => {
      // a-sceneのカメラ起動後にTM初期化
      setTimeout(initTM, 3000);
    });
  </script>
</head>
<body>
  <div id="title">XR エクササイズ</div>
  <div id="confidence">モデル読み込み中...</div>

  <button id="status" ontouchend="openOverlay()" onclick="openOverlay()">
    🔍 非常口にカメラを向けてください
  </button>

  <div id="exercise-overlay">
    <div class="exercise-card">
      <div class="acquired-badge">🎉 エクササイズ01：非常口の退勤後　を採取しました！</div>
      <div class="exercise-name">ベントニーシットアップ</div>
      <div class="exercise-name-en">Bent Knee Sit-Up</div>
      <div class="model-area">🏃</div>
      <div class="speech-bubble">
        あの姿勢をずっと続けるために、<br>体幹を鍛えております。
      </div>
      <button class="close-btn" ontouchend="closeOverlay()" onclick="closeOverlay()">
        閉じる
      </button>
    </div>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="character" src="character.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">
      <a-entity
        gltf-model="#character"
        scale="3 3 3"
        position="0 4 0"
        rotation="0 0 0"
        animation-mixer="loop: repeat"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
