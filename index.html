<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XRエクササイズ</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.3/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: black; font-family: 'Helvetica Neue', 'Hiragino Sans', sans-serif; }

    #title {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: white; font-size: 18px; font-weight: bold;
      background: rgba(220,60,60,0.9); padding: 8px 24px;
      border-radius: 20px; z-index: 999; pointer-events: none; white-space: nowrap;
    }

    #status {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      font-size: 15px; font-weight: bold; text-align: center;
      padding: 12px 24px; border-radius: 20px; z-index: 9999;
      white-space: nowrap; cursor: pointer;
      background: rgba(80,80,80,0.85); color: #ccc;
      border: none; outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    #status.found { background: rgba(0,180,80,0.95); color: white; }

    /* オーバーレイ */
    #exercise-overlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 10000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #exercise-overlay.active { display: flex; }

    .exercise-card {
      background: white;
      border-radius: 24px;
      padding: 24px 20px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .acquired-badge {
      background: #ff6b35;
      color: white;
      font-size: 13px;
      font-weight: bold;
      padding: 6px 16px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 16px;
    }

    .exercise-name {
      font-size: 20px;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .exercise-name-en {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
    }

    /* GLBをcanvasで表示する代わりにモデルビューア風のコンテナ */
    .model-area {
      position: relative;
      background: #e8f5e9;
      border-radius: 16px;
      height: 160px;
      margin-bottom: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: visible;
    }

    .model-figure {
      font-size: 100px;
      line-height: 1;
      margin-bottom: -8px;
      filter: hue-rotate(90deg) saturate(2);
    }

    /* 吹き出し */
    .speech-bubble {
      position: relative;
      background: #00c853;
      color: white;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 14px;
      font-weight: bold;
      line-height: 1.7;
      margin: 20px 0 16px;
      text-align: left;
    }
    .speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -14px;
      left: 40px;
      border: 7px solid transparent;
      border-top-color: #00c853;
    }

    .close-btn {
      background: #eeeeee;
      color: #333;
      border: none;
      border-radius: 12px;
      padding: 14px 0;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
  <script>
    AFRAME.registerComponent('marker-status', {
      schema: { name: { type: 'string', default: 'マーカー' } },
      init: function () {
        var el = this.el;
        var name = this.data.name;
        var statusEl = document.getElementById('status');
        el.addEventListener('markerFound', function () {
          statusEl.textContent = '✅ ' + name + ' 認識中　→　タップ';
          statusEl.className = 'found';
        });
        el.addEventListener('markerLost', function () {
          statusEl.textContent = '🔍 マーカーを探しています…';
          statusEl.className = '';
        });
      }
    });

    function openOverlay() {
      document.getElementById('exercise-overlay').classList.add('active');
    }
    function closeOverlay() {
      document.getElementById('exercise-overlay').classList.remove('active');
    }
  </script>
</head>
<body>
  <div id="title">XR エクササイズ</div>

  <button id="status" ontouchend="openOverlay()" onclick="openOverlay()">
    🔍 マーカーにカメラを向けてください
  </button>

  <!-- オーバーレイ -->
  <div id="exercise-overlay">
    <div class="exercise-card">

      <div class="acquired-badge">🎉 エクササイズ01：非常口の退勤後　を採取しました！</div>

      <div class="exercise-name">ベントニーシットアップ</div>
      <div class="exercise-name-en">Bent Knee Sit-Up</div>

      <!-- モデル表示エリア（3Dモデルをインラインで表示） -->
      <div class="model-area">
        <a-scene
          embedded
          style="width:100%;height:160px;border-radius:16px;"
          vr-mode-ui="enabled:false"
          arjs="false"
          renderer="antialias:true"
        >
          <a-assets>
            <a-asset-item id="char2" src="character.glb"></a-asset-item>
          </a-assets>
          <a-entity
            gltf-model="#char2"
            scale="0.8 0.8 0.8"
            position="0 -0.5 -2"
            rotation="0 0 0"
            animation-mixer="loop:repeat"
          ></a-entity>
          <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
          <a-light type="directional" position="1 2 1" intensity="1"></a-light>
          <a-camera position="0 1 0" look-controls="enabled:false" wasd-controls="enabled:false"></a-camera>
        </a-scene>
      </div>

      <div class="speech-bubble">
        あの姿勢をずっと続けるために、<br>体幹を鍛えております。
      </div>

      <button class="close-btn" ontouchend="closeOverlay()" onclick="closeOverlay()">
        閉じる
      </button>

    </div>
  </div>

  <!-- メインAR -->
  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="character" src="character.glb"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro" marker-status="name: 歩行者信号">
      <a-entity
        gltf-model="#character"
        scale="3 3 3"
        position="0 4 0"
        rotation="0 0 0"
        animation-mixer="loop: repeat"
      ></a-entity>
    </a-marker>

    <a-marker type="pattern" url="exit.patt" marker-status="name: 非常口">
      <a-entity
        gltf-model="#character"
        scale="3 3 3"
        position="0 4 0"
        rotation="0 0 0"
        animation-mixer="loop: repeat"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
