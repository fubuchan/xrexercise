<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XRエクササイズ</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.3/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; background: black; font-family: 'Helvetica Neue', 'Hiragino Sans', sans-serif; }

    #title {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: white; font-size: 18px; font-weight: bold;
      background: rgba(220,60,60,0.9); padding: 8px 24px;
      border-radius: 20px; z-index: 999; pointer-events: none; white-space: nowrap;
    }
    #status {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      font-size: 15px; font-weight: bold; text-align: center;
      padding: 12px 24px; border-radius: 20px; z-index: 9999;
      white-space: nowrap; cursor: pointer;
      background: rgba(80,80,80,0.85); color: #ccc;
      border: none; outline: none; transition: background 0.3s;
    }
    #status.found { background: rgba(0,180,80,0.95); color: white; }
    #confidence {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      font-size: 13px; color: white;
      background: rgba(0,0,0,0.5); padding: 6px 16px;
      border-radius: 12px; z-index: 9999; pointer-events: none; white-space: nowrap;
    }

    #ar-model-viewer {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      width: 260px; height: 360px;
      z-index: 500;
      pointer-events: none;
      --progress-bar-color: transparent;
      background-color: transparent;
    }
    #ar-model-viewer.active { display: block; }

    #exercise-overlay {
      visibility: hidden;
      opacity: 0;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: opacity 0.2s;
    }
    #exercise-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .exercise-card {
      background: white; border-radius: 24px;
      padding: 24px 20px; width: 100%; max-width: 360px; text-align: center;
    }
    .acquired-badge {
      background: #ff6b35; color: white; font-size: 12px; font-weight: bold;
      padding: 6px 16px; border-radius: 20px; display: inline-block;
      margin-bottom: 16px; line-height: 1.5;
    }
    .exercise-name { font-size: 20px; font-weight: bold; color: #1a1a1a; margin-bottom: 4px; }
    .exercise-name-en { font-size: 12px; color: #888; margin-bottom: 12px; }

    #overlay-model-viewer {
      width: 100%; height: 180px;
      border-radius: 16px;
      margin-bottom: 16px;
      --progress-bar-color: transparent;
      background-color: #e8f5e9;
    }

    .speech-bubble {
      background: #00c853; color: white; border-radius: 16px;
      padding: 14px 18px; font-size: 14px; font-weight: bold;
      line-height: 1.7; margin-bottom: 16px; text-align: left;
    }
    .close-btn {
      background: #eeeeee; color: #333; border: none;
      border-radius: 12px; padding: 14px 0;
      font-size: 15px; font-weight: bold; cursor: pointer; width: 100%;
    }
  </style>
  <script>
    const MODEL_URL = 'https://teachablemachine.withgoogle.com/models/x5wEdZGP7/';
    let tmModel;

    async function initTM() {
      try {
        tmModel = await tmImage.load(MODEL_URL + 'model.json', MODEL_URL + 'metadata.json');
        document.getElementById('confidence').textContent = '準備完了';
        predict();
      } catch(e) {
        document.getElementById('confidence').textContent = 'エラー: ' + e.message;
      }
    }

    async function predict() {
      if (!tmModel) return;
      const video = document.querySelector('video');
      if (!video || video.readyState < 2) { setTimeout(predict, 500); return; }
      try {
        const prediction = await tmModel.predict(video);
        const top = prediction.reduce((a, b) => a.probability > b.probability ? a : b);
        const isExit = top.className === 'Class 1' && top.probability > 0.5;
        document.getElementById('confidence').textContent =
          `${top.className}: ${Math.round(top.probability * 100)}%`;
        const statusEl = document.getElementById('status');
        const arViewer = document.getElementById('ar-model-viewer');
        if (isExit) {
          statusEl.textContent = '✅ 非常口 認識中　→　タップ';
          statusEl.className = 'found';
          arViewer.classList.add('active');
        } else {
          statusEl.textContent = '🔍 非常口にカメラを向けてください';
          statusEl.className = '';
          arViewer.classList.remove('active');
        }
      } catch(e) {}
      setTimeout(predict, 500);
    }

    function openOverlay() {
      document.getElementById('exercise-overlay').classList.add('active');
      // model-viewerを再描画させる
      const mv = document.getElementById('overlay-model-viewer');
      mv.dismissPoster && mv.dismissPoster();
    }
    function closeOverlay() {
      document.getElementById('exercise-overlay').classList.remove('active');
    }

    window.addEventListener('load', () => {
      setTimeout(initTM, 3000);
    });
  </script>
</head>
<body>
  <div id="title">XR エクササイズ</div>
  <div id="confidence">モデル読み込み中...</div>

  <!-- 認識中のmodel-viewer：ライト強化・環境マップで緑を出す -->
  <model-viewer
    id="ar-model-viewer"
    src="character.glb"
    orientation="0deg 90deg 0deg"
    autoplay
    camera-controls="false"
    disable-zoom
    interaction-prompt="none"
            environment-image="neutral"
    exposure="2"
    shadow-intensity="0"
    style="--progress-bar-color: transparent; background: transparent;"
  ></model-viewer>

  <button id="status" ontouchend="openOverlay()" onclick="openOverlay()">
    🔍 非常口にカメラを向けてください
  </button>

  <!-- オーバーレイ：display:noneではなくvisibility:hiddenで常にDOMに存在させる -->
  <div id="exercise-overlay">
    <div class="exercise-card">
      <div class="acquired-badge">🎉 エクササイズ01：非常口の退勤後　を採取しました！</div>
      <div class="exercise-name">ベントニーシットアップ</div>
      <div class="exercise-name-en">Bent Knee Sit-Up</div>
      <model-viewer
        id="overlay-model-viewer"
        src="character.glb"
        orientation="0deg 90deg 0deg"
        autoplay
        camera-controls="false"
        disable-zoom
        interaction-prompt="none"
                        environment-image="neutral"
        exposure="2"
        shadow-intensity="0"
        style="--progress-bar-color: transparent;"
      ></model-viewer>
      <div class="speech-bubble">
        あの姿勢をずっと続けるために、<br>体幹を鍛えております。
      </div>
      <button class="close-btn" ontouchend="closeOverlay()" onclick="closeOverlay()">閉じる</button>
    </div>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false"
  >
    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
