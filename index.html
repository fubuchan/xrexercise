<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XRエクササイズ</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.3/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: black; font-family: 'Helvetica Neue', sans-serif; }
    #title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 18px;
      font-weight: bold;
      background: rgba(220,60,60,0.9);
      padding: 8px 24px;
      border-radius: 20px;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
    #status {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      padding: 12px 24px;
      border-radius: 20px;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
      background: rgba(80,80,80,0.85);
      color: #ccc;
      transition: background 0.3s;
    }
    #status.found {
      background: rgba(0,180,80,0.95);
      color: white;
    }
  </style>
  <script>
    AFRAME.registerComponent('marker-status', {
      schema: { name: { type: 'string', default: 'マーカー' } },
      init: function () {
        var el = this.el;
        var name = this.data.name;
        var statusEl = document.getElementById('status');
        el.addEventListener('markerFound', function () {
          statusEl.textContent = '✅ ' + name + ' 認識中';
          statusEl.className = 'found';
        });
        el.addEventListener('markerLost', function () {
          statusEl.textContent = '🔍 マーカーを探しています…';
          statusEl.className = '';
        });
      }
    });
  </script>
</head>
<body>
  <div id="title">XR エクササイズ</div>
  <div id="status">🔍 マーカーにカメラを向けてください</div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="character" src="character.glb"></a-asset-item>
    </a-assets>

    <!-- 歩行者信号：hiroマーカー -->
    <a-marker preset="hiro" marker-status="name: 歩行者信号">
      <a-entity
        gltf-model="#character"
        scale="0.01 0.01 0.01"
        position="0 0.5 0"
        rotation="0 0 0"
        animation-mixer="loop: repeat"
      ></a-entity>
      <a-text
        value="立ちっぱで\n疲れるわ！\nちょっと伸ばそ。"
        position="0.8 1.5 0"
        color="#ffffff"
        width="3.5"
        align="left"
      ></a-text>
    </a-marker>

    <!-- 非常口：カスタムマーカー -->
    <a-marker
      type="pattern"
      url="exit.patt"
      marker-status="name: 非常口"
    >
      <a-entity
        gltf-model="#character"
        scale="0.01 0.01 0.01"
        position="0 0.5 0"
        rotation="0 0 0"
        animation-mixer="loop: repeat"
      ></a-entity>
      <a-text
        value="ちょっと\nストレッチ\nしていこ！"
        position="0.8 1.5 0"
        color="#ffffff"
        width="3.5"
        align="left"
      ></a-text>
    </a-marker>

    <a-entity camera></a-entity>

  </a-scene>
</body>
</html>
